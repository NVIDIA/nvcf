# Example environment file for EKS deployment
# Copy to nvcf-self-managed-stack/environments/<your-env>.yaml and customize.
#
# Only keys listed here are propagated by global.yaml.gotmpl to charts.
# For arbitrary chart overrides, use helmfile release values: blocks instead
# (see "Overriding Helm Chart Values" in SKILL.md).

global:
  # Route hostname suffix. For production, use a base DNS domain and point
  # its route records to the Gateway status address. For direct tests without
  # DNS, use a stable reserved suffix such as nvcf.test and send the matching
  # Host header while connecting to the Gateway address. See SKILL.md step 3.
  domain: "<ROUTE_DOMAIN>"

  helm:
    sources:
      # OCI registry where NVCF Helm charts are stored
      registry: nvcr.io
      # Public NVCF namespace for Helm chart artifacts.
      repository: "nvidia/nvcf"

  image:
    # OCI registry where NVCF container images are stored (often same as chart registry)
    registry: nvcr.io
    # Public NVCF namespace for container images.
    repository: "nvidia/nvcf"

  # Storage class for persistent volumes (Cassandra, NATS JetStream, OpenBao)
  # On EKS, common choices: gp3, gp2, io1
  storageClass: "gp3"

  # Node selectors: set enabled: true to restrict NVCF pods to labeled nodes.
  # When enabled, pods require the label "nvcf-node: true" on target nodes.
  nodeSelectors:
    enabled: false

# --- Per-service overrides (optional) ---

cassandra:
  # Number of Cassandra replicas: 1 for dev/test, 3 for production
  replicaCount: 1
  # persistence.size controls the PVC size for Cassandra data
  # persistence:
  #   size: 50Gi

