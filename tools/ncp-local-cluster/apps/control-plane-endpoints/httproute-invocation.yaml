apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: invocation-control-plane
  namespace: nvcf
spec:
  hostnames:
    - invocation.nvcf.svc.cluster.local
  parentRefs:
    - name: shared-gw
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - backendRefs:
        - name: invocation
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
