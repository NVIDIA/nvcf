# CI-only values for helm lint/template validation.
image:
  repository: example.com/nvcf/nvca-operator
  tag: "3.0.4"

nvcaImage:
  repositoryOverride: example.com/nvcf/nvca

ngcConfig:
  clusterSource: self-managed
  serviceKey: not-used

selfManaged:
  icmsServiceURL: http://icms.example.invalid:8080
  revalServiceURL: http://reval.example.invalid:8080
  natsURL: nats://nats.example.invalid:4222
  nvcaVersion: "3.0.4"
  featureGateValues: ["DynamicGPUDiscovery", "SelfHosted"]
  imageCredHelper:
    imageRepository: example.com/nvcf/nvcf-image-credential-helper
    imageTag: "0.5.0"
  sharedStorage:
    imageRepository: example.com/nvcf/samba
    imageTag: "1.0.5"

generateImagePullSecret: false
imagePullSecrets: []
