# Restore placeholder for a criu-v2 (in-namespace) checkpoint of vllm-qwen32b.
# Dumb reaper: same image as the source, bash pid1 loop, no hostPID. The agent
# drives everything on POST /v1/restore. See internal/agent/restore_v2.go and
# vllm-small-restore.yaml (identical pattern; only the pod name differs).
apiVersion: v1
kind: Pod
metadata:
  name: vllm-qwen32b-restored
  namespace: nvsnap-system
  labels:
    app: vllm-qwen32b-restored
    nvsnap.io/demo: "true"
spec:
  automountServiceAccountToken: false
  nodeName: __NODE_NAME__

  imagePullSecrets:
    - name: nvsnap-pull-secret

  containers:
    - name: restore
      image: vllm/vllm-openai:v0.20.0
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -e
          mkdir -p /var/run/vllm
          echo 100000 > /proc/sys/kernel/ns_last_pid || echo "(ns_last_pid bump failed)"
          touch /vllm.out
          tail -F /vllm.out &
          while true; do sleep 30; done
      env:
        - name: CHECKPOINT_ID
          value: "__CHECKPOINT_ID__"
        - { name: HF_HOME, value: "/root/.cache/huggingface" }
      readinessProbe:
        httpGet: { path: /v1/models, port: 8000 }
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 120
      securityContext:
        privileged: true
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
      volumeMounts:
        - { name: checkpoints, mountPath: /checkpoints }
        - { name: dev-shm, mountPath: /dev/shm }

  volumes:
    - name: checkpoints
      hostPath:
        path: /var/lib/containerd/nvsnap-checkpoints
        type: Directory
    - name: dev-shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi

  restartPolicy: Never
