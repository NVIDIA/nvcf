#
# nvca-gpu-profiling-config: NVCF function IDs to profile, plus an optional label override
# for the Nsight Operator. Created at deploy/upgrade from .Values.agent.gpuProfiling.* and
# mirrored by the operator into the agent namespace. Empty functionIds profiles nothing;
# empty labelKey/labelValue use the defaults (nvidia-nsight-profile=enabled).
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvca-gpu-profiling-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
data:
  functionIds: {{ (((.Values.agent).gpuProfiling).functionIds) | default "" | quote }}
  labelKey: {{ (((.Values.agent).gpuProfiling).labelKey) | default "" | quote }}
  labelValue: {{ (((.Values.agent).gpuProfiling).labelValue) | default "" | quote }}
