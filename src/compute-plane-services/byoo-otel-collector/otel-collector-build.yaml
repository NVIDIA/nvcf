dist:
  name: otelcol-contrib
  description: NVCF Custom OpenTelemetry Collector binary
  # Stable module path for the generated collector. The `otelcol/` tree
  # is checked in (ocb output is committed; see
  # scripts/regenerate-otelcol.sh and tools/ci/check-otelcol-generated).
  # Pinning the module name keeps the generated go.mod stable across
  # regenerations so version bumps produce reviewable diffs.
  module: github.com/NVIDIA/nvcf/src/compute-plane-services/byoo-otel-collector/otelcol
  output_path: ./output # the output path which contains otelcol-contrib binary

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.153.0
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.153.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusremotewriteexporter v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/datadogexporter v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/splunkhecexporter v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/azuremonitorexporter v0.153.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8seventsreceiver v0.153.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.153.0
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/attributesprocessor v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/k8sattributesprocessor v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourceprocessor v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourcedetectionprocessor v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/filterprocessor v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/metricstransformprocessor v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor v0.153.0

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/basicauthextension v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/bearertokenauthextension v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/oauth2clientauthextension v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckv2extension v0.153.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/cgroupruntimeextension v0.153.0

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.59.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.59.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpprovider v1.59.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpsprovider v1.59.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.59.0

# datadogexporter pulls Datadog modules whose own go.mod files use local
# replacements for these submodules. OCB does not inherit those local replaces,
# so keep explicit published versions here for the generated collector module.
replaces:
  - github.com/DataDog/datadog-agent/comp/core/delegatedauth => github.com/DataDog/datadog-agent/comp/core/delegatedauth v0.79.0-devel.0.20260402163801-bfa4eff6c991
  - github.com/DataDog/datadog-agent/comp/core/delegatedauth/api/cloudauth/aws => github.com/DataDog/datadog-agent/comp/core/delegatedauth/api/cloudauth/aws v0.79.0-devel.0.20260402163801-bfa4eff6c991
