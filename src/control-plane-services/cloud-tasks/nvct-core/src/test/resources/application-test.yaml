spring.main.allow-bean-definition-overriding: true

# Faster JVM exit after integration tests (avoids Surefire fork exit timeout when many
# @SpringBootTest contexts shut down gRPC + Tomcat + file watchers sequentially).
server:
  shutdown: immediate

grpc:
  server:
    port: 0  # Random port to avoid BindException when running multiple integration tests

management:
  tracing:
    export:
      enabled: false
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: https://dummy:8282
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      cache:
        time-to-live: 2s
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include:
            - readinessState
            - cassandra
        liveness:
          include:
            - livenessState
            - cassandra
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    vault:
      enabled: false
    kubernetes:
      enabled: false
  metrics:
    enable:
      all: true
    tags:
      env: ${spring.application.env}
      micro_service: ${spring.application.name}
      service_version: ${spring.application.version}
      host_id: ${spring.application.host.id}
      host_dc: ${spring.application.host.dc}
  prometheus:
    metrics:
      export:
        enabled: true
  observations:
    annotations:
      enabled: true
  server:
    port: 8181

spring:
  lifecycle:
    timeout-per-shutdown-phase: 5s
  cassandra:
    contact-points: 127.0.0.1
    keyspace-name: nvct
    username: ${kv.cassandra.username}
    password: ${kv.cassandra.password}
    request:
      timeout: 30s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9092
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/.well-known/jwks.json
          jws-algorithms: ES256
      client:
        registration:
          # API Keys - used for authorizing requests
          api-keys:
            provider: api-keys
            client-id: ${kv.oauth2.client-id}
            client-secret: ${kv.oauth2.client-secret}
            authorization-grant-type: client_credentials
            scope: pdp-evaluate
          # ICMS(Instance and Cluster Management Service) - used for instance and cluster management
          icms:
            provider: icms
            client-id: ${kv.oauth2.client-id}
            client-secret: ${kv.oauth2.client-secret}
            authorization-grant-type: client_credentials
            scope: instance-request,cluster_listing,instance_types,cluster-management
          # NVCF API - used for account setup
          nvcf:
            provider: nvcf
            client-id: ${kv.oauth2.client-id}
            client-secret: ${kv.oauth2.client-secret}
            authorization-grant-type: client_credentials
            scope: account_setup
          # Notary Service - used for token assertions
          notary:
            provider: notary
            client-id: ${kv.oauth2.client-id}
            client-secret: ${kv.oauth2.client-secret}
            authorization-grant-type: client_credentials
            scope: make-assertion
          # ESS (Enterprise Secret Service) - used for secrets management
          ess:
            provider: ess
            client-id: ${kv.oauth2.client-id}
            client-secret: ${kv.oauth2.client-secret}
            authorization-grant-type: client_credentials
            scope: ess:secrets-admin,ess:entities-admin
          # Reval Service - used for Helm chart validation
          reval:
            provider: reval
            client-id: ${kv.oauth2.client-id}
            client-secret: ${kv.oauth2.client-secret}
            authorization-grant-type: client_credentials
            scope: helmreval:validate
        provider:
          api-keys:
            token-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/token
          icms:
            token-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/token
          nvcf:
            token-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/token
          notary:
            token-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/token
          ess:
            token-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/token
          reval:
            token-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/token

logging:
  level:
    root: WARN   # To see [AUDIT] logs in stdout, this should be set to INFO
    com.nvidia: DEBUG
    com.nvidia.nvct.configuration: INFO
    com.nvidia.nvct.util: INFO
    # Default org.springframework.web: DEBUG would log full MethodArgumentNotValidException text
    # (including multi‑KB rejected values) from ExceptionHandlerExceptionResolver.
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: INFO
    # RestTemplate at DEBUG logs full serialized objects (e.g. CreateTaskRequest with multi‑KB secrets).
    org.springframework.web.client.RestTemplate: INFO
    # HttpLogging at DEBUG logs request/response bodies (same risk as RestTemplate for tests using testRestTemplate).
    org.springframework.web.HttpLogging: INFO
    org.springframework.web: DEBUG
    org.springframework.data.cassandra.core.cql.CqlTemplate: INFO

