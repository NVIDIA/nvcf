spring.main.allow-bean-definition-overriding: true

# Faster JVM exit after integration tests (avoids Surefire fork exit timeout when many
# @SpringBootTest contexts shut down gRPC + Tomcat + file watchers sequentially).
server:
  shutdown: immediate

grpc:
  server:
    port: 0  # Random port to avoid BindException when running multiple integration tests

spring:
  lifecycle:
    timeout-per-shutdown-phase: 5s
  cassandra:
    contact-points: 127.0.0.1
    keyspace-name: nvct
    request:
      timeout: 30s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9092

management:
  tracing:
    export:
      enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: https://dummy:8282

logging:
  level:
    com.nvidia: DEBUG
    com.nvidia.nvct.configuration: INFO
    com.nvidia.nvct.util: INFO
    org.springframework.web.client.RestTemplate: INFO
    org.springframework.web.HttpLogging: INFO
    org.springframework.web: DEBUG
    org.springframework.data.cassandra.core.cql.CqlTemplate: INFO

nvct:
  fqdn: http://localhost:${server.port}
  global-fqdn-grpc: http://localhost:9090
  sidecars:
    hostname: fake.registry.test
  aws:
    region: us-east-1
  ess:
    base-url: http://localhost:9098
  notary:
    audiences:
      ess: dummy-ess-audience
      nvct: dummy-nvct-audience
    base-url: http://localhost:9097
  nvcf:
    base-url: http://localhost:9119
  reval:
    base-url: http://localhost:9099
  icms:
    base-url: http://localhost:9096
    allocator:
      enabled: true
  api-keys:
    base-url: http://localhost:9093
  rate-limiters:
    account-rate-limiter:
      allowed-invocations-per-second: 200
    task-rate-limiter:
      allowed-invocations-per-second: 200
  scheduled-routines:
    enabled: true
    lock-consistency: QUORUM
    clean-terminal-tasks-routine:
      enabled: false
    monitor-launched-tasks-routine:
      enabled: false
    monitor-queued-tasks-routine:
      enabled: false
    monitor-worker-heartbeat-routine:
      enabled: false
