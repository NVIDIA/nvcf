spring:
  application:
    name: nvct-api
    env: default
    version: ${SPRING_APPLICATION_VERSION:0.0.1-dummy-version}
    host:
      id: ${HOSTNAME:${spring.application.name}-${random.int}-host}
      dc: ${AWS_REGION:${spring.application.name}-${random.uuid}-dc}
  cloud:
    kubernetes:
      config:
        enabled: ${REMOTE_CONFIG_ENABLED:false}
        name: ${REMOTE_CONFIG_NAME:nvct-api-remote-config}
        fail-fast: true
        retry:
          enabled: true
          max-attempts: 6
      reload:
        enabled: true
        mode: event
        strategy: refresh
        monitoring-config-maps: true
        monitoring-secrets: false
    refresh:
      # Avoid warning - java.lang.IllegalArgumentException: wrong number of arguments: 0 expected: 27 - during startup
      never-refreshable: com.zaxxer.hikari.HikariDataSource,org.springframework.cloud.kubernetes.commons.KubernetesClientProperties

nv-boot:
  reloadable-properties:
    file: local_env/vault/secrets.json
