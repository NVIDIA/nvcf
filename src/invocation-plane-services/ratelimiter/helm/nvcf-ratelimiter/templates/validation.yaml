{{/*
Validation template for required runtime configuration.
Fails the render if any required env value is missing so the chart cannot
install into a state that will only fail at runtime.
*/}}

{{- $required := list "OAUTH2_JWKS_URL" "NVCF_API_URL" }}
{{- range $key := $required }}
  {{- if not (index $.Values.rateLimiter.env $key) }}
    {{- fail (printf "rateLimiter.env.%s is required (set it in values or via --set rateLimiter.env.%s=<value>)" $key $key) }}
  {{- end }}
{{- end }}

{{- if false }}
# This template is used only for validation and produces no output
{{- end }}
