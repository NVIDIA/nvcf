{{- if eq .Values.grpcproxy.deploymentType "deployment" }}
apiVersion: v1
kind: Service
metadata:
  name: grpc
  namespace: {{ include "grpc-proxy.namespace" . }}
  labels:
    {{- include "grpc-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: deployment
  {{- with .Values.grpcproxy.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.grpcproxy.service.type | default "ClusterIP" }}
  ports:
    {{- range .Values.grpcproxy.ports }}
    - name: {{ .name }}
      port: {{ .containerPort }}
      targetPort: {{ .containerPort }}
      protocol: {{ .protocol }}
    {{- end }}
  selector:
    {{- include "grpc-proxy.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: deployment
{{- end }}
