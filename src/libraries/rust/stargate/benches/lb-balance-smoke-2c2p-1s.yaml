name: lb-balance-smoke-2c2p-1s
metadata:
  description: Small end-to-end validation for two equal routing clusters with two pylons each behind one stargate.
  tags: [smoke, load-balance, grouped-pylons, homogeneous]
  expected_runtime: short
  expected_signal: All algorithms should remain successful and split load approximately evenly between equal-capacity clusters.
model: dummy-model
seed: 701
request_count: 80
max_concurrency: 16

stargates:
  count: 1

backends:
  count: 4
  pylons_per_cluster: 2
  cluster_id_template: cluster-{cluster_index}
  profile:
    name: homogeneous
    weight: 1.0
    max_concurrent_requests: 6
    kv_cache_capacity_tokens: 120000
    service_time_ms:
      ttft_mean: 35
      ttft_jitter_ms: 5
      decode_jitter_ms: 2
      prefill_tokens_per_s: 9000
      decode_tokens_per_s: 220
    registration:
      last_mean_input_tps: 200

traffic_pattern:
  kind: uniform
  routing_keys: 0
  cache_affinity_keys: 32
  input_tokens:
    distribution: uniform
    min: 128
    max: 640
  output_tokens:
    distribution: uniform
    min: 24
    max: 72
  arrival:
    distribution: constant
    interval_ms: 40

algorithms:
  - name: power-of-two
    config:
      default: power-of-two
  - name: round-robin
    config:
      default: round-robin
  - name: random
    config:
      default: random
  - name: groq-multiregion
    config:
      default: groq-multiregion
  - name: pulsar
    config:
      default: power-of-two
      models:
        dummy-model:
          algorithm: pulsar
          seed: grouped-smoke-v1
          require_cache_affinity_key: true
          require_input_tokens: true
