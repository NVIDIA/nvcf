name: lb-balance-prefix-reuse-smoke-2c2p-1s
metadata:
  description: Short growing-prefix validation run for coding-style sessions with long shared context and small new suffixes.
  tags: [load-balance, grouped-pylons, cache, prefix-reuse, coding-session, smoke]
  expected_runtime: short
  expected_signal: Once a session is warm on a cluster, its TTFT should reflect only the appended suffix; compare cache-affine GMR and the no-SLO PULSAR/PULSAR-multiregion primary controls against non-affine routing.
model: dummy-model
seed: 704
request_count: 32
max_concurrency: 8

stargates:
  count: 1

backends:
  count: 4
  pylons_per_cluster: 2
  cluster_id_template: cluster-{cluster_index}
  profile:
    name: smoke-prefix
    weight: 1.0
    max_concurrent_requests: 4
    kv_cache_capacity_tokens: 262144
    service_time_ms:
      ttft_mean: 10
      ttft_jitter_ms: 1
      decode_jitter_ms: 1
      prefill_tokens_per_s: 32768
      decode_tokens_per_s: 512
    registration:
      last_mean_input_tps: 32768

traffic_pattern:
  kind: prefix_reuse
  routing_keys: 0
  cache_affinity_keys: 4
  initial_input_tokens:
    distribution: constant
    value: 16384
  incremental_input_tokens:
    distribution: constant
    value: 256
  output_tokens:
    distribution: constant
    value: 16
  arrival:
    distribution: poisson
    target_rps: 20

algorithms:
  - name: power-of-two
    config:
      default: power-of-two
  - name: round-robin
    config:
      default: round-robin
  - name: random
    config:
      default: random
  - name: groq-multiregion
    config:
      default: groq-multiregion
  - name: groq-multiregion-affinity
    config:
      default: power-of-two
      models:
        dummy-model:
          algorithm: groq-multiregion
          seed: growing-prefix-smoke-gmr-affinity-v1
          require_cache_affinity_key: true
          require_input_tokens: true
          cache_affinity_backend_selection_count: 1
  - name: pulsar
    config:
      default: power-of-two
      models:
        dummy-model:
          algorithm: pulsar
          seed: growing-prefix-smoke-v1
          require_cache_affinity_key: true
          require_input_tokens: true
  - name: pulsar-consider-kv-free-tokens
    config:
      default: power-of-two
      models:
        dummy-model:
          algorithm: pulsar
          seed: growing-prefix-smoke-v1
          require_cache_affinity_key: true
          consider_kv_free_tokens: true
  - name: pulsar-multiregion
    config:
      default: power-of-two
      models:
        dummy-model:
          algorithm: pulsar-multiregion
          seed: growing-prefix-smoke-v1
          require_cache_affinity_key: true
          require_input_tokens: true
  - name: pulsar-multiregion-consider-kv-free-tokens
    config:
      default: power-of-two
      models:
        dummy-model:
          algorithm: pulsar-multiregion
          seed: growing-prefix-smoke-v1
          require_cache_affinity_key: true
          consider_kv_free_tokens: true
