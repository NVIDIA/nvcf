# Single NATS Server supporting all regions

# Ephemeral ports (-1 = OS-assigned) so multiple servers can run concurrently
# across parallel package test binaries (go test ./...). Callers must use the
# server's reported ClientURL()/MonitorAddr(), never a hardcoded port.
listen: 127.0.0.1:-1
server_name: single-server
no_sys_acc: true
server_tags: ["aws-region:region-1", "aws-region:region-2", "aws-region:region-3"]
jetstream: enabled

# /healthz?js-enabled-only=true
http: 127.0.0.1:-1 