# cassandra.yaml overrides for the in-house Cassandra node.
#
# The official cassandra image ships its own cassandra.yaml and its entrypoint
# only seds a fixed set of CASSANDRA_* keys (cluster name, seeds, snitch, dc,
# addresses). Any other setting (auth, auto_repair, uuid_sstable_identifiers,
# and so on) has no env hook. This ConfigMap carries a single overrides file,
# rendered from .Values.cassandra.config, which the StatefulSet initContainer
# deep-merges onto the image's cassandra.yaml (via yq) before the main container
# starts. Our keys win; the image defaults are kept for everything else. Do not
# put the entrypoint-templated keys here (see values.yaml config comment).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cassandra.fullname" . }}-conf
  namespace: {{ include "cassandra.namespace" . }}
  labels: {{- include "cassandra.labels" . | nindent 4 }}
data:
  cassandra-overrides.yaml: |
{{ .Values.cassandra.config | toYaml | indent 4 }}
