{{- if and .Values.kyverno.enabled (not .Values.webhook.enabled) }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-unbound-dns
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Add Unbound DNS to all NVCF pods/helms
    policies.kyverno.io/category: Sample
    policies.kyverno.io/subject: Pod,Volume
    kyverno.io/kyverno-version: 1.6.0
    kyverno.io/kubernetes-version: "1.21"
    policies.kyverno.io/minversion: 1.5.0
    policies.kyverno.io/description:  Add Unbound DNS to all NVCF pods/helms
spec:
  background: false
  rules:
  - name: add-unbound-dns
    match:
      any:
      - resources:
          kinds:
          - Pod
          operations: ["CREATE"]
          namespaceSelector:
            matchExpressions:
              - key: "nvca.nvcf.nvidia.io/spot-instance-type"
                operator: In
                values:
                - pod_spec
                - helm_chart
                - miniservice
      - resources:
          kinds:
          - Pod
          operations: ["CREATE"]
          namespaceSelector:
            matchExpressions:
              - key: "nvca.nvcf.nvidia.io/workload-instance-type"
                operator: In
                values:
                - pod_spec
                - helm_chart
                - miniservice
    preconditions:
      # Per-function opt-out: skip the DNS redirect when any container or init
      # container sets NVCF_DISABLE_PROXY_CACHE=true, so the pod bypasses the
      # proxy cache. The trailing [] flattens the per-container projection to a
      # flat list of values; without it AllNotIn compares against sub-arrays and
      # never matches. Kept in sync with the webhook cacheOptedOut check.
      all:
      - key: "true"
        operator: AllNotIn
        value: "{{ `{{` }} request.object.spec.containers[].env[?name=='NVCF_DISABLE_PROXY_CACHE'].value[] {{ `}}` }}"
      - key: "true"
        operator: AllNotIn
        value: "{{ `{{` }} request.object.spec.initContainers[].env[?name=='NVCF_DISABLE_PROXY_CACHE'].value[] || `[]` {{ `}}` }}"
    mutate:
      patchStrategicMerge:
        spec:
          dnsPolicy: None
          dnsConfig:
            nameservers:
              - {{ $.Values.unbound.cluster_ip }} # IP of UnboundDNS
              - {{  $.Values.unbound.stub_nameserver }}  # IP of coreDNS
            searches:
              - "{{ `{{` }} request.namespace {{ `}}` }}.svc.cluster.local"
            options:
            - name: ndots
              value: "5"
            - name: timeout
              value: "1"
{{- end }}
