# Sample values overlay for DaemonSet-only deployment
# Usage: helm install grpc-proxy ./grpc-proxy -f values.daemonset.yaml

grpcproxy:
  # Required image configuration
  image:
    registry: ""
    repository: ""
    tag: "latest"

  # Set deployment type to DaemonSet
  deploymentType: "daemonset"

  # DaemonSet-specific configuration
  daemonset:
    # DaemonSet-specific tolerations to run on all nodes
    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    # Node selector for specific node types if needed
    nodeSelector: {}
    # Update strategy for DaemonSet
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1

  # DaemonSet typically uses higher resource requests
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
