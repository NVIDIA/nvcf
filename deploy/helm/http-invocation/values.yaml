---
replicaCount: 1

nameOverride: nvcf-invocation-service

image:
  repository: nvcr.io/0651155215864979/ncp-dev/nvcf-invocation-service
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets:
  - name: docker-registry-rf-secret

entrypoint:
  command: /bin/server
  args: []
  # Path the rendered settings.yaml ConfigMap is mounted at.
  configPath: "/etc/settings.yaml"

env: {}
envFromSecret: {}

podAnnotations:

podLabels:

service:
  host: "nvcf-invocation-service.service.odp.nvidia.com"
  port: 8080
  tls_secret:
  annotations:
  # The deployment template uses gRPC probes; only the delaySeconds field
  # is read. The httpGet/initialDelaySeconds/periodSeconds keys below are
  # vestigial; preserved for behaviour parity with the previous rendered
  # output. See issue #7 for cleanup.
  livenessProbe:
    delaySeconds: 10
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 3
    periodSeconds: 3
  readinessProbe:
    delaySeconds: 10
  startupProbe:
    delaySeconds: 10

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: nvidia.com/gpu.present
          operator: NotIn
          values:
          - "true"

ingress:
  enabled: false
  annotations:
  ingressClassName: nginx
  path: /

settings:
  custom: {}
  server:
    ip_address: 0.0.0.0
    port: '50051'
    metrics_server:
      enabled: true
      addr: 127.0.0.1:41337
    metrics:
      service_name_format: metric_prefix
      report_optional: true
    # OTLP tracing exporter. The Rust ServerSettings struct (see
    # crates/server/src/telemetry/settings.rs) reads this block; the app
    # sends OTLP/gRPC traces to endpoint_ip:endpoint_port. In nvks the
    # in-pod otelCollector sidecar listens on localhost:4317 and forwards
    # to the cluster-wide collector via its own exporters.otlp.endpoint.
    tracing:
      endpoint_ip: http://localhost
      endpoint_port: 4317
    # `tracing` crate EnvFilter directive. Read at server level (not
    # under tracing) per ServerSettings.envfilter_directive.
    envfilter_directive: info
    tonic:
      initial_stream_window_size: 65535
      initial_connection_window_size: 65535
      max_decoding_message_size: 4194304
      request_timeout: 30

# OpenTelemetry collector sidecar for processing logs, metrics, and traces.
# Consumers (e.g. files/values-nvks.yaml) override only what they need.
otelCollector:
  enabled: true

  image:
    name: "otel-collector"
    repository: "otel/opentelemetry-collector-contrib"
    # `latest` + IfNotPresent lets nodes drift onto different actual
    # digests of "latest". Pin to a concrete version in the issue #7
    # follow-up.
    tag: "latest"
    pullPolicy: IfNotPresent

  entrypoint:
    command: ["/otelcol-contrib"]
    args: []
    configPath: "/etc/otel/config.yaml"

  env:
    OTEL_SERVICE_NAME: "unspecified"
    OTEL_SERVICE_VERSION: "0.0.0"
    OTEL_APP_IMAGE_NAME: "unspecified"
    OTEL_APP_IMAGE_TAG: ""

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  source:
    metrics:
      port: 6931
      endpoint: "/metrics"
      scrapeInterval: "15s"
    logging:
      enabled: false
      output:
      volume: "log-dir"
      path: "/var/log"

  exporters: {}

  extensions:
    basicauth/logs:
      client_auth:
        username: $LOKI_USERNAME
        password: $LOKI_PASSWORD
    health_check:
      endpoint: "0.0.0.0:13133"
      path: "/health"

  service:
    pipelines:
      traces:
        exporters: [logging]
      metrics:
        exporters: [logging]
      logs:
        exporters: [logging]
