apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nvcf-invocation-service.fullname" . }}
  namespace: {{ include "nvcf-invocation-service.namespace" . }}
  labels:
    {{- include "nvcf-invocation-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.invocation.replicaCount }}
  selector:
    matchLabels:
      {{- include "nvcf-invocation-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "nvcf-invocation-service.vaultAnnotations" . | nindent 8 }}
        {{- with .Values.invocation.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.invocation.env }}
        checksum/config-env: {{ toYaml .Values.invocation.env | sha256sum }}
        {{- end }}
      labels:
        {{- include "nvcf-invocation-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.invocation.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: invocation-api
      securityContext:
        {{- toYaml .Values.invocation.podSecurityContext | nindent 8 }}
      volumes:
        {{- with .Values.invocation.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: vault-config-templates
          configMap:
            name: {{ include "nvcf-invocation-service.fullname" . }}-vault-agent-tpl
            items:
              - key: secrets.json.tmpl
                path: secrets.json.tmpl
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.invocation.securityContext | nindent 12 }}
          image: "{{ include "nvcf-invocation-service.image" . }}"
          imagePullPolicy: {{ .Values.invocation.image.pullPolicy }}
          volumeMounts:
            {{- with .Values.invocation.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: vault-config-templates
              mountPath: /vault/config/templates
              readOnly: true
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          {{- if .Values.invocation.env }}
          envFrom:
            - configMapRef:
                name: {{ include "nvcf-invocation-service.fullname" . }}-env
          {{- end }}
          ports:
            {{- range .Values.invocation.ports }}
            - name: {{ .name }}
              containerPort: {{ .containerPort }}
              protocol: {{ .protocol }}
            {{- end }}
          resources:
            {{- toYaml .Values.invocation.resources | nindent 12 }}
      {{- with .Values.invocation.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.invocation.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.invocation.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
