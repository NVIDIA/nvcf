{{- if and .Values.llmApiGateway.olric.enabled .Values.llmApiGateway.olric.rbac.create }}
# Grants the gateway ServiceAccount read access to pods in its own namespace so
# Olric's memberlist k8s plugin can discover peer pods. Without this, the
# gateway starts, logs an Olric discovery error, and - with
# RATE_LIMIT_FAIL_OPEN=true - falls back to ratelimit.AllowAll, silently
# disabling rate limits. Without it and FailOpen=false, the rate limiter
# rejects everything.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "llm-api-gateway.fullname" . }}-olric
  namespace: {{ include "llm-api-gateway.namespace" . }}
  labels:
    {{- include "llm-api-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "llm-api-gateway.fullname" . }}-olric
  namespace: {{ include "llm-api-gateway.namespace" . }}
  labels:
    {{- include "llm-api-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "llm-api-gateway.fullname" . }}-olric
subjects:
  - kind: ServiceAccount
    name: {{ include "llm-api-gateway.serviceAccountName" . }}
    namespace: {{ include "llm-api-gateway.namespace" . }}
{{- end }}
