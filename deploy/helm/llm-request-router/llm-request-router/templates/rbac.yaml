{{- if and .Values.llmRequestRouter.serviceAccount.create .Values.llmRequestRouter.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "llm-request-router.fullname" . }}-pod-reader
  namespace: {{ include "llm-request-router.namespace" . }}
  labels:
    {{- include "llm-request-router.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "llm-request-router.fullname" . }}-pod-reader
  namespace: {{ include "llm-request-router.namespace" . }}
  labels:
    {{- include "llm-request-router.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "llm-request-router.fullname" . }}-pod-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "llm-request-router.serviceAccountName" . }}
    namespace: {{ include "llm-request-router.namespace" . }}
{{- end }}
