apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-request-router.fullname" . }}
  namespace: {{ include "llm-request-router.namespace" . }}
  labels:
    {{- include "llm-request-router.labels" . | nindent 4 }}
spec:
  type: {{ .Values.llmRequestRouter.service.type }}
  selector:
    {{- include "llm-request-router.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.llmRequestRouter.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
    {{- if (dig "metrics" "enabled" false .Values.llmRequestRouter) }}
    - name: metrics
      port: {{ .Values.llmRequestRouter.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
    {{- if .Values.llmRequestRouter.transport.reverseTunnelListenAddr }}
    - name: quic
      port: {{ .Values.llmRequestRouter.service.reverseTunnelPort }}
      targetPort: reverse
      protocol: UDP
    {{- end }}
