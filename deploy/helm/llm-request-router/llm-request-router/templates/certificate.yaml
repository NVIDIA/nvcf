{{ $certificate := .Values.llmRequestRouter.certificate | default dict -}}
{{- if $certificate.enabled }}
{{- $issuerRef := $certificate.issuerRef | default dict -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "llm-request-router.tlsSecretName" . | quote }}
  labels:
    {{- include "llm-request-router.labels" . | nindent 4 }}
spec:
  secretName: {{ include "llm-request-router.tlsSecretName" . | quote }}
  {{- with $certificate.duration }}
  duration: {{ . | quote }}
  {{- end }}
  {{- with $certificate.renewBefore }}
  renewBefore: {{ . | quote }}
  {{- end }}
  dnsNames:
    {{- required "llmRequestRouter.certificate.dnsNames is required when certificate.enabled is true" $certificate.dnsNames | toYaml | nindent 4 }}
  issuerRef:
    kind: {{ default "ClusterIssuer" $issuerRef.kind | quote }}
    name: {{ required "llmRequestRouter.certificate.issuerRef.name is required when certificate.enabled is true" $issuerRef.name | quote }}
    {{- with $issuerRef.group }}
    group: {{ . | quote }}
    {{- end }}
  usages:
    {{- default (list "server auth") $certificate.usages | toYaml | nindent 4 }}
  {{- with $certificate.privateKey }}
  privateKey:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
