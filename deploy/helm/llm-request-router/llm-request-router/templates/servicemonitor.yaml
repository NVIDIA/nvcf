{{- $metricsEnabled := dig "metrics" "enabled" false .Values.llmRequestRouter }}
{{- $smEnabled := dig "metrics" "serviceMonitor" "enabled" false .Values.llmRequestRouter }}
{{- if and $smEnabled (not $metricsEnabled) }}
{{- fail "llmRequestRouter.metrics.enabled must be true when llmRequestRouter.metrics.serviceMonitor.enabled is true" }}
{{- end }}
{{- if and $metricsEnabled $smEnabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "llm-request-router.fullname" . }}-metrics
  labels:
    {{- include "llm-request-router.labels" . | nindent 4 }}
spec:
  endpoints:
    - interval: {{ dig "metrics" "serviceMonitor" "interval" "30s" .Values.llmRequestRouter | quote }}
      path: {{ dig "metrics" "serviceMonitor" "path" "/metrics" .Values.llmRequestRouter | quote }}
      port: {{ dig "metrics" "serviceMonitor" "port" "metrics" .Values.llmRequestRouter | quote }}
  namespaceSelector:
    matchNames:
      - {{ include "llm-request-router.namespace" . }}
  selector:
    matchLabels:
      {{- include "llm-request-router.selectorLabels" . | nindent 6 }}
{{- end }}
