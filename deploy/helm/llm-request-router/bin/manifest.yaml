# Source: llm-request-router/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-request-router
  labels:
    helm.sh/chart: llm-request-router-0.0.0
    app.kubernetes.io/name: llm-request-router
    app.kubernetes.io/instance: llm-request-router
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-request-router
      app.kubernetes.io/instance: llm-request-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-request-router
        app.kubernetes.io/instance: llm-request-router
      annotations:
        vault.hashicorp.com/agent-copy-volume-mounts: llm-request-router
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-template-file-secrets.json: /vault/config/templates/secrets.json.tmpl
        vault.hashicorp.com/agent-run-as-same-user: "true"
        vault.hashicorp.com/auth-path: auth/jwt
        vault.hashicorp.com/role: llm-request-router
        vault.hashicorp.com/secret-volume-path: /vault/secrets
    spec:
      serviceAccountName: llm-request-router
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: llm-request-router
          image: :0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --stargate-id=$(POD_NAME)
            - --listen-addr=0.0.0.0:50071
            - --http-listen-addr=0.0.0.0:8000
            - --advertise-addr=$(POD_IP):50071
            - --stargate-discovery-dns-name=llm-request-router-headless.default.svc.cluster.local
            - --pod-name=$(POD_NAME)
            - --pod-namespace=$(POD_NAMESPACE)
            - --pod-label-selector=app.kubernetes.io/name=llm-request-router
            - --dns-poll-ms=1000
            - --dns-resolver-ttl-ms=1000
            - --watch-heartbeat-ms=5000
            - --shutdown-drain-timeout-ms=30000
            - --quic-connect-timeout-ms=2000
            - --quic-request-timeout-ms=30000
            - --metrics-port=9090
            - --reverse-tunnel-connect-timeout-ms=10000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: grpc
              containerPort: 50071
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            - name: vault-config-templates
              mountPath: /vault/config/templates
              readOnly: true
      volumes:
        - name: token
          projected:
            sources:
            - serviceAccountToken:
                path: token
                expirationSeconds: 3600
                audience: http://openbao-server.vault-system.svc.cluster.local:8200
        - name: vault-config-templates
          configMap:
            name: llm-request-router-vault-agent-tpl
            items:
              - key: secrets.json.tmpl
                path: secrets.json.tmpl
