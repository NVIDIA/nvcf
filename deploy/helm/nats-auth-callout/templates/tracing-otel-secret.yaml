apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.tracing.otel.secretName | default (printf "%s-tracing-otel" (include "app.fullname" .)) }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: tracing-otel
type: Opaque
data:
  {{- if .Values.tracing.otel.secretHeaders.authorization }}
  authorization: {{ .Values.tracing.otel.secretHeaders.authorization | b64enc | quote }}
  {{- end }}
  {{- if .Values.tracing.otel.secretHeaders.x_api_key }}
  x-api-key: {{ .Values.tracing.otel.secretHeaders.x_api_key | b64enc | quote }}
  {{- end }}
{{- end }} 