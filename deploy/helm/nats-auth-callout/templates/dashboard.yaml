---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ include "app.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    {{- with .Values.dashboard.grafana.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.dashboard.grafana.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  allowCrossNamespaceImport: {{ .Values.dashboard.grafana.allowCrossNamespaceImport }}
  # Target the Grafana instance that has the dashboard discovery labels
  instanceSelector:
    matchLabels:
      {{- with .Values.dashboard.grafana.labels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

  # Resync period for the dashboard
  resyncPeriod: {{ .Values.dashboard.grafana.resyncPeriod }}

  # Reference the JSON file via ConfigMap
  configMapRef:
    name: {{ include "app.fullname" . }}-dashboard-json
    key: dashboard.json
{{- end }}
