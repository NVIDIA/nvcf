apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-tracing
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
data:
  # Standardized secret keys with tracing_ prefix
  {{- if .Values.tracing.token }}
  tracing_token: {{ .Values.tracing.token | b64enc | quote }}
  {{- end }}
  {{- if .Values.tracing.api_key }}
  tracing_api_key: {{ .Values.tracing.api_key | b64enc | quote }}
  {{- end }}
{{- end }} 