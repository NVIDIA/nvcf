apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "app.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken | default false }}
      imagePullSecrets:
        {{- if .Values.imagePullSecrets }}
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
        {{- end }}
        {{- if or .Values.registry.existingSecret .Values.registry.username }}
        - name: {{ .Values.registry.existingSecret | default (printf "%s-registry" (include "app.fullname" .)) }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "server"
            - "--config"
            - "/etc/config/config.yaml"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
            # Service and Application Configuration
            - name: NVCF_NATS_AUTH_CALLOUT_SERVICE_SERVICE_NAME
              value: {{ .Release.Name | quote }}
            - name: NVCF_NATS_AUTH_CALLOUT_SERVICE_SERVER_PORT
              value: {{ .Values.service.port | quote }}

            # Kubernetes Runtime Information
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            # Tracing Configuration
            - name: NVCF_NATS_AUTH_CALLOUT_SERVICE_TRACING_ENABLED
              value: {{ .Values.tracing.enabled | quote }}
            {{- if .Values.tracing.enabled }}
            
            # OpenTelemetry Tracing Secrets
            {{- if or .Values.tracing.otel.existingSecret .Values.tracing.otel.secretHeaders.authorization }}
            - name: NVCF_NATS_AUTH_CALLOUT_SERVICE_TRACING_OTEL_HEADERS_AUTHORIZATION
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tracing.otel.existingSecret | default (.Values.tracing.otel.secretName | default (printf "%s-tracing-otel" (include "app.fullname" .))) }}
                  key: authorization
                  optional: true
            {{- end }}
            {{- if or .Values.tracing.otel.existingSecret .Values.tracing.otel.secretHeaders.x_api_key }}
            - name: NVCF_NATS_AUTH_CALLOUT_SERVICE_TRACING_OTEL_HEADERS_X___API___KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tracing.otel.existingSecret | default (.Values.tracing.otel.secretName | default (printf "%s-tracing-otel" (include "app.fullname" .))) }}
                  key: x-api-key
                  optional: true
            {{- end }}
            
            # Lightstep Tracing Secrets
            {{- if or .Values.tracing.lightstep.existingSecret .Values.tracing.lightstep.secretAccessToken }}
            - name: NVCF_NATS_AUTH_CALLOUT_SERVICE_TRACING_LIGHTSTEP_ACCESS__TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tracing.lightstep.existingSecret | default (.Values.tracing.lightstep.secretName | default (printf "%s-tracing-lightstep" (include "app.fullname" .))) }}
                  key: access-token
                  optional: true
            {{- end }}
            {{- end }}

            # Additional Environment Variables
            {{- with .Values.extraEnvs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

            # Metrics Configuration
            - name: NVCF_NATS_AUTH_CALLOUT_SERVICE_METRICS_ENABLED
              value: {{ .Values.metrics.enabled | quote }}
            - name: NVCF_NATS_AUTH_CALLOUT_SERVICE_METRICS_PORT
              value: {{ .Values.metrics.port | quote }}

          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true

          {{- if .Values.healthChecks.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthChecks.livenessProbe.httpGet.path }}
              port: {{ .Values.healthChecks.livenessProbe.httpGet.port }}
              scheme: {{ .Values.healthChecks.livenessProbe.httpGet.scheme }}
            initialDelaySeconds: {{ .Values.healthChecks.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthChecks.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthChecks.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthChecks.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.healthChecks.livenessProbe.successThreshold }}
          {{- end }}

          {{- if .Values.healthChecks.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthChecks.readinessProbe.httpGet.path }}
              port: {{ .Values.healthChecks.readinessProbe.httpGet.port }}
              scheme: {{ .Values.healthChecks.readinessProbe.httpGet.scheme }}
            initialDelaySeconds: {{ .Values.healthChecks.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthChecks.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthChecks.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthChecks.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.healthChecks.readinessProbe.successThreshold }}
          {{- end }}

          {{- if .Values.healthChecks.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.healthChecks.startupProbe.httpGet.path }}
              port: {{ .Values.healthChecks.startupProbe.httpGet.port }}
              scheme: {{ .Values.healthChecks.startupProbe.httpGet.scheme }}
            initialDelaySeconds: {{ .Values.healthChecks.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthChecks.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthChecks.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthChecks.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.healthChecks.startupProbe.successThreshold }}
          {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "app.fullname" . }}-config