apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "function-autoscaler.fullname" . }}
  namespace: {{ include "function-autoscaler.namespace" . }}
  labels:
    {{- include "function-autoscaler.labels" . | nindent 4 }}
spec:
  {{- if not .Values.functionautoscaler.autoscaling.enabled }}
  replicas: {{ .Values.functionautoscaler.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "function-autoscaler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.functionautoscaler.vault.enabled }}
        {{- include "function-autoscaler.vaultAnnotations" . | nindent 8 }}
        {{- end }}
        {{- with .Values.functionautoscaler.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.functionautoscaler.env }}
        checksum/config-env: {{ toYaml .Values.functionautoscaler.env | sha256sum }}
        {{- end }}
      labels:
        {{- include "function-autoscaler.selectorLabels" . | nindent 8 }}
        {{- with .Values.functionautoscaler.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.functionautoscaler.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "function-autoscaler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.functionautoscaler.podSecurityContext | nindent 8 }}
      containers:
      - name: function-autoscaler
        securityContext:
          {{- toYaml .Values.functionautoscaler.securityContext | nindent 12 }}
        image: {{ include "function-autoscaler.image" . }}
        imagePullPolicy: {{ .Values.functionautoscaler.image.pullPolicy }}
        ports:
          {{- toYaml .Values.functionautoscaler.ports | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.functionautoscaler.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.functionautoscaler.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.functionautoscaler.resources | nindent 10 }}
        {{- if .Values.functionautoscaler.env }}
        envFrom:
        - configMapRef:
            name: {{ include "function-autoscaler.fullname" . }}-env
        {{- end }}
        {{- if or .Values.functionautoscaler.volumeMounts .Values.functionautoscaler.vault.enabled }}
        volumeMounts:
          {{- with .Values.functionautoscaler.volumeMounts }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- if .Values.functionautoscaler.vault.enabled }}
          - name: vault-config-templates
            mountPath: /vault/config/templates
            readOnly: true
          {{- end }}
        {{- end }}
      {{- with .Values.functionautoscaler.extraContainers }}
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if or .Values.functionautoscaler.volumes .Values.functionautoscaler.vault.enabled }}
      volumes:
        {{- with .Values.functionautoscaler.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.functionautoscaler.vault.enabled }}
        - name: vault-config-templates
          configMap:
            name: {{ include "function-autoscaler.fullname" . }}-vault-agent-tpl
            items:
              - key: secrets.json.tmpl
                path: secrets.json.tmpl
        {{- end }}
      {{- end }}
      {{- with .Values.functionautoscaler.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.functionautoscaler.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.functionautoscaler.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
