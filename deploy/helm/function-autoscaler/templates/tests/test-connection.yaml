apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "function-autoscaler.fullname" . }}-test-connection"
  namespace: {{ include "function-autoscaler.namespace" . }}
  labels:
    {{- include "function-autoscaler.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:
        - '-qO-'
        - '{{ include "function-autoscaler.serviceName" . }}.{{ include "function-autoscaler.namespace" . }}.svc.cluster.local:{{ (index .Values.functionautoscaler.service.ports 1).port }}{{ .Values.functionautoscaler.livenessProbe.httpGet.path }}'
  restartPolicy: Never
