{{- if .Values.functionautoscaler.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "function-autoscaler.fullname" . }}
  namespace: {{ include "function-autoscaler.namespace" . }}
  labels:
    {{- include "function-autoscaler.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "function-autoscaler.fullname" . }}
  minReplicas: {{ .Values.functionautoscaler.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.functionautoscaler.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.functionautoscaler.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.functionautoscaler.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.functionautoscaler.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.functionautoscaler.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
