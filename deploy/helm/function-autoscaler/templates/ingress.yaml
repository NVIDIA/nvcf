{{- if .Values.rsfTemplate.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
{{- if .Values.rsfTemplate.ingress.annotations }}
{{ toYaml .Values.rsfTemplate.ingress.annotations | indent 4 }}
{{- end}}
  name: {{ include "rsf-template.name" . }}-grpc
  labels:
  {{- include "rsf-template.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.rsfTemplate.ingress.ingressClassName }}
  {{- if and .Values.rsfTemplate.service.host .Values.rsfTemplate.service.tls_secret }}
  tls:
  - hosts:
      - {{ .Values.rsfTemplate.service.host }}
    secretName: {{ .Values.rsfTemplate.service.tls_secret }}
  {{- end }}
  rules:
  {{- if .Values.rsfTemplate.service.host }}
  - host: {{ .Values.rsfTemplate.service.host }}
    http:
      paths:
      - pathType: Prefix
        path: {{ .Values.rsfTemplate.ingress.path }}
        backend:
          service:
            name: {{ include "rsf-template.name" . }}
            port:
              number: {{ .Values.rsfTemplate.service.port }}
  {{- end }}
{{- end }}