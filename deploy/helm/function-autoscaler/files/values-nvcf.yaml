---

rsfTemplate:
  replicaCount: 1

  nameOverride: nvcf-autoscaler-service
  containerName: inference

  image:
    repository: <your-registry>/<your-org>/nvcf-autoscaler-service
    pullPolicy: Always
    tag: latest

  entrypoint:
    command: /bin/server
    args: []

  podLabels:
    NCA_ID: "sf_metric"

  ingress:
    enabled: false

  settings:
    server:
      metrics:
        selectedMetricsBackend: "ott-metrics"
        ottMetrics:
          metrics: {}
          # The OTEL_EXPORTER_OTLP_ENDPOINT (from ov-otel-collector)
          # is honored implicitly by ott-metrics

        foundationsMetrics:
          metrics_server:
            addr: "0.0.0.0:8002"

      tracing:
        selectedTracingBackend: "ott-tracing"
        rsfTracing:
          tracing:
            endpoint_ip: ov-otel-collector

  env:
    # These are honored by ott-metrics
    OTEL_METRIC_EXPORT_INTERVAL: 5000

ov-otel-collector:
  enabled: true

  lightstep:
    accessToken: $LIGHTSTEP_ACCESS_TOKEN
    enabled: true
    endpoint: https://<your-otel-endpoint>:8282
