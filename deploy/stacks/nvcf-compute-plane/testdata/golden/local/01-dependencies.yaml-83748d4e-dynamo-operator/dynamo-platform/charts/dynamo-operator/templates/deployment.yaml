---
# Source: dynamo-platform/charts/dynamo-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamo-operator-controller-manager
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: dynamo-operator
    app.kubernetes.io/part-of: dynamo-operator
    control-plane: controller-manager
    helm.sh/chart: dynamo-operator-1.2.1
    app.kubernetes.io/name: dynamo-operator
    app.kubernetes.io/instance: dynamo-operator
    app.kubernetes.io/version: "1.2.1"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: dynamo-operator
      app.kubernetes.io/instance: dynamo-operator
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: dynamo-operator
        app.kubernetes.io/instance: dynamo-operator
      annotations:
        kubectl.kubernetes.io/default-container: manager
        checksum/config: 8263a5b1b34b068a346f747d194430ee788a19129881ffeaff70c5e927a55a37
    spec:
      initContainers:
      - name: crd-apply
        image: nvcr.io/nvidia/ai-dynamo/kubernetes-operator:1.2.1
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        command: ["/crd-apply"]
        args:
          - "--crds-dir=/opt/dynamo-operator/crds/"
          - "--version=1.2.1"
      containers:
      - args:
        - --config=/etc/dynamo-operator/config.yaml
        - --operator-version=1.2.1
        command:
        - /manager
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: "cluster.local"
        - name: POD_SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        imagePullPolicy: "IfNotPresent"
        image: nvcr.io/nvidia/ai-dynamo/kubernetes-operator:1.2.1
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 1024m
            memory: 2Gi
          requests:
            cpu: 512m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /etc/dynamo-operator
          name: operator-config
          readOnly: true
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: dynamo-operator-controller-manager
      terminationGracePeriodSeconds: 30
      volumes:
      - name: operator-config
        configMap:
          name: dynamo-operator-config
      - name: cert
        secret:
          defaultMode: 420
          secretName: webhook-server-cert
          # Allow the pod to start before the secret exists so the
          # in-operator cert-controller can bootstrap it at runtime.
          optional: true
---
