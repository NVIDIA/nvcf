---
# Source: dynamo-platform/charts/dynamo-operator/templates/gpu-discovery-rbac.yaml
# Grants the operator read-only node access for GPU hardware discovery.
# Nodes are cluster-scoped resources that cannot be granted via a namespace-scoped Role,
# so they are always provided as a dedicated ClusterRole when GPU discovery is enabled.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dynamo-operator-dynamo-system-gpu-discovery
  labels:
    helm.sh/chart: dynamo-operator-1.2.1
    app.kubernetes.io/name: dynamo-operator
    app.kubernetes.io/instance: dynamo-operator
    app.kubernetes.io/version: "1.2.1"
    app.kubernetes.io/managed-by: Helm
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# Source: dynamo-platform/charts/dynamo-operator/templates/gpu-discovery-rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dynamo-operator-dynamo-system-gpu-discovery
  labels:
    helm.sh/chart: dynamo-operator-1.2.1
    app.kubernetes.io/name: dynamo-operator
    app.kubernetes.io/instance: dynamo-operator
    app.kubernetes.io/version: "1.2.1"
    app.kubernetes.io/managed-by: Helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dynamo-operator-dynamo-system-gpu-discovery
subjects:
  - kind: ServiceAccount
    name: dynamo-operator-controller-manager
    namespace: dynamo-system
---
