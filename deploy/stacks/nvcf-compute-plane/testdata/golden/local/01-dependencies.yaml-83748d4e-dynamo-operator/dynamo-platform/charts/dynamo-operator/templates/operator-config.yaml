apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamo-operator-config
  labels:
    helm.sh/chart: dynamo-operator-1.2.1
    app.kubernetes.io/name: dynamo-operator
    app.kubernetes.io/instance: dynamo-operator
    app.kubernetes.io/version: "1.2.1"
    app.kubernetes.io/managed-by: Helm
data:
  config.yaml: |
    apiVersion: operator.config.dynamo.nvidia.com/v1alpha1
    kind: OperatorConfiguration
    server:
      metrics:
        bindAddress: "0.0.0.0"
        secure: true
      webhook:
        certProvisionMode: "auto"
        secretName: "webhook-server-cert"
        serviceName: dynamo-operator-webhook-service
    leaderElection:
      enabled: true
      id: "dynamo.nvidia.com"
      namespace: "kube-system"
    orchestrators:
      kaiScheduler:
        enabled: false
      grove:
        enabled: true
        terminationDelay: "4h"
    infrastructure:
      natsAddress: "nats://dynamo-operator-nats.dynamo-system.svc.cluster.local:4222"
    rbac:
      plannerClusterRoleName: dynamo-operator-planner
      dgdrProfilingClusterRoleName: dynamo-operator-dgdr-profiling
      eppClusterRoleName: dynamo-operator-epp
    mpi:
      sshSecretName: "mpi-run-ssh-secret"
      sshSecretNamespace: "dynamo-system"
