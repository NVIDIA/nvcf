# Source: grove-charts/templates/clustertopology-validating-webhook-config.yaml
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: clustertopology-validating-webhook
  labels:
    chart: "grove-charts-v0.1.0-alpha.9"
    release: "grove-operator"
    app.kubernetes.io/component: operator-clustertopology-validating-webhook
    app.kubernetes.io/name: clustertopology-validating-webhook
    app.kubernetes.io/part-of: grove
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: grove-operator
        namespace: grove-system
        path: /webhooks/validate-clustertopology
        port: 9443
    failurePolicy: Fail
    matchPolicy: Exact
    name: clustertopology.validating.webhooks.grove.io
    namespaceSelector: { }
    rules:
      - apiGroups:
          - "grove.io"
        apiVersions:
          - "v1alpha1"
        operations:
          - CREATE
          - UPDATE
        resources:
          - clustertopologybindings
        scope: "Cluster"
    sideEffects: None
    timeoutSeconds: 10
