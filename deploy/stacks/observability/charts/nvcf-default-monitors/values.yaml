commonLabels:
  nvcf.nvidia.com/observability-target: "true"

dcgm:
  enabled: false
  namespace: ""
  namespaceSelector:
    any: true
  interval: 30s
  path: /metrics
  # NVCA currently uses this name for the injected DCGM metrics port; keep the
  # monitor disabled until the consuming stack owns that chart contract.
  port: dcgm-metrics
  labels: {}

# Control-plane ServiceMonitors, owned by the obs stack. Each renders one
# ServiceMonitor that picks up the observability-target label via commonLabels.
controlPlane:
  enabled: false
  interval: 30s
  path: /metrics
  port: metrics
  # Default namespace the services run in (ServiceMonitor namespaceSelector).
  # Per-service `namespaces` overrides this to keep each monitor scoped tightly.
  namespaces:
    - nvcf
  services:
    - name: state-metrics
      enabled: true
      selector:
        app.kubernetes.io/instance: state-metrics
        app.kubernetes.io/name: helm-nvcf-state-metrics
    - name: grpc-proxy
      enabled: true
      selector:
        app.kubernetes.io/instance: grpc-proxy
    - name: api
      enabled: true
      selector:
        app.kubernetes.io/name: helm-nvcf-api
    - name: sis
      enabled: true
      namespaces:
        - sis
      selector:
        app.kubernetes.io/name: helm-nvcf-sis
    - name: llm-api-gateway
      enabled: true
      selector:
        app.kubernetes.io/instance: llm-api-gateway
    # Off until the Invocation Service exporter is enabled.
    - name: invocation-service
      enabled: false
      selector:
        app.kubernetes.io/instance: invocation-service
