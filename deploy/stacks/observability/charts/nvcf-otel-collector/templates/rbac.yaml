apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.collectorName }}-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcf-otel-collector.labels" . | nindent 4 }}
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- if .Values.targetAllocator.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.collectorName }}-targetallocator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcf-otel-collector.labels" . | nindent 4 }}
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
---
{{- if .Values.targetAllocatorRbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.collectorName }}-otel
  labels:
    {{- include "nvcf-otel-collector.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
      - podmonitors
      - probes
      - scrapeconfigs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - nodes
      - nodes/metrics
      - services
      - endpoints
      - pods
      - configmaps
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - nonResourceURLs:
      - /metrics
      - /metrics/cadvisor
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.collectorName }}-otel-targetallocator
  labels:
    {{- include "nvcf-otel-collector.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.collectorName }}-otel
subjects:
  - kind: ServiceAccount
    name: {{ .Values.collectorName }}-targetallocator
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
